<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Room Reservation System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 30px;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 2.5em;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .control-panel {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 8px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-weight: 600;
      color: #333;
      font-size: 0.95em;
    }

    input[type="number"] {
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 1em;
      transition: border-color 0.3s;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .button-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      align-items: flex-end;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-book {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-book:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-reset {
      background: #ff6b6b;
      color: white;
    }

    .btn-reset:hover {
      background: #ee5a52;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
    }

    .btn-random {
      background: #4ecdc4;
      color: white;
    }

    .btn-random:hover {
      background: #44b8ad;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(78, 205, 196, 0.3);
    }

    .message {
      margin-top: 15px;
      padding: 15px;
      border-radius: 6px;
      font-weight: 500;
      animation: slideIn 0.3s ease;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border-left: 4px solid #28a745;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border-left: 4px solid #dc3545;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .visualizer {
      margin-top: 30px;
      border-top: 2px solid #e0e0e0;
      padding-top: 30px;
    }

    .visualizer h2 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
      font-size: 1.5em;
    }

    .floors-container {
      max-height: 500px;
      overflow-y: auto;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 15px;
      background: #fafafa;
    }

    .floor {
      margin-bottom: 25px;
      padding: 15px;
      background: white;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }

    .floor-title {
      font-weight: 700;
      color: #667eea;
      margin-bottom: 12px;
      font-size: 1.1em;
    }

    .rooms-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
      gap: 8px;
    }

    .room {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.85em;
      cursor: pointer;
      transition: all 0.2s;
      background: white;
      color: #333;
    }

    .room:hover {
      transform: scale(1.05);
    }

    .room.available {
      border-color: #28a745;
      background: #e8f5e9;
      color: #155724;
    }

    .room.available:hover {
      background: #c8e6c9;
      box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
    }

    .room.booked {
      border-color: #dc3545;
      background: #ffebee;
      color: #721c24;
    }

    .room.booked:hover {
      background: #ffcdd2;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 2px solid #e0e0e0;
    }

    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-label {
      font-size: 0.9em;
      opacity: 0.9;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 2em;
      font-weight: 700;
    }

    .scrollable {
      max-height: calc(100vh - 500px);
      overflow-y: auto;
    }

    @media (max-width: 768px) {
      .container {
        padding: 15px;
      }

      h1 {
        font-size: 1.8em;
      }

      .control-panel {
        grid-template-columns: 1fr;
      }

      .rooms-grid {
        grid-template-columns: repeat(auto-fill, minmax(35px, 1fr));
      }

      .room {
        font-size: 0.7em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hotel Room Reservation System</h1>

    <div class="control-panel">
      <div class="input-group">
        <label for="numRooms">Number of Rooms to Book (1-5):</label>
        <input 
          type="number" 
          id="numRooms" 
          min="1" 
          max="5" 
          value="2" 
          placeholder="Enter number of rooms"
        >
      </div>

      <div class="button-group">
        <button class="btn-book" onclick="bookRooms()">Book</button>
        <button class="btn-random" onclick="generateRandomOccupancy()">Random</button>
        <button class="btn-reset" onclick="resetBooking()">Reset</button>
      </div>

      <div id="message" class="message" style="display: none;"></div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="visualizer">
      <h2>Room Availability</h2>
      <div class="floors-container scrollable" id="floorsContainer"></div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin === 'http://localhost:3000' || window.location.origin.includes('localhost')
      ? 'http://localhost:5001/api' 
      : '/api';

    async function fetchRooms() {
      try {
        const response = await fetch(`${API_BASE}/rooms`);
        return await response.json();
      } catch (error) {
        console.error('Error fetching rooms:', error);
        showMessage('error fetching rooms', 'error');
        return [];
      }
    }

    async function bookRooms() {
      const numRooms = parseInt(document.getElementById('numRooms').value);

      if (isNaN(numRooms) || numRooms < 1 || numRooms > 5) {
        showMessage('please enter a number between 1 and 5', 'error');
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/book`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ requiredRooms: numRooms })
        });

        const data = await response.json();

        if (response.ok) {
          showMessage(
            `Booked rooms: ${data.bookedRooms.join(', ')}\nTravel Time: ${data.travelTime} minutes`,
            'success'
          );
          loadVisualization();
        } else {
          showMessage(`${data.error}`, 'error');
        }
      } catch (error) {
        console.error('Error booking rooms:', error);
        showMessage('error booking rooms, is the server running?', 'error');
      }
    }

    async function generateRandomOccupancy() {
      try {
        const response = await fetch(`${API_BASE}/random-occupancy`, {
          method: 'POST'
        });

        if (response.ok) {
          showMessage('randomized occupancy', 'success');
          loadVisualization();
        }
      } catch (error) {
        console.error('Error generating random occupancy:', error);
        showMessage('error randomizing', 'error');
      }
    }

    async function resetBooking() {
      try {
        const response = await fetch(`${API_BASE}/reset`, {
          method: 'POST'
        });

        if (response.ok) {
          showMessage('reset successful', 'success');
          loadVisualization();
        }
      } catch (error) {
        console.error('Error resetting bookings:', error);
        showMessage('failed to reset', 'error');
      }
    }

    async function loadVisualization() {
      const rooms = await fetchRooms();

      if (rooms.length === 0) return;

      const floorsContainer = document.getElementById('floorsContainer');
      floorsContainer.innerHTML = '';

      // Group rooms by floor
      const floorMap = {};
      rooms.forEach(room => {
        if (!floorMap[room.floor]) {
          floorMap[room.floor] = [];
        }
        floorMap[room.floor].push(room);
      });

      // Render floors
      for (let floor = 1; floor <= 10; floor++) {
        const floorRooms = floorMap[floor] || [];
        floorRooms.sort((a, b) => a.roomNumber - b.roomNumber);

        const floorDiv = document.createElement('div');
        floorDiv.className = 'floor';

        const floorTitle = document.createElement('div');
        floorTitle.className = 'floor-title';
        floorTitle.textContent = `Floor ${floor}`;
        floorDiv.appendChild(floorTitle);

        const roomsGrid = document.createElement('div');
        roomsGrid.className = 'rooms-grid';

        floorRooms.forEach(room => {
          const roomDiv = document.createElement('div');
          roomDiv.className = `room ${room.booked ? 'booked' : 'available'}`;
          roomDiv.textContent = room.roomNumber;
          roomDiv.title = `Room ${room.roomNumber} - ${room.booked ? 'Booked' : 'Available'}`;
          roomsGrid.appendChild(roomDiv);
        });

        floorDiv.appendChild(roomsGrid);
        floorsContainer.appendChild(floorDiv);
      }

      updateStats(rooms);
    }

    function updateStats(rooms) {
      const bookedCount = rooms.filter(r => r.booked).length;
      const availableCount = rooms.filter(r => !r.booked).length;
      const occupancyRate = ((bookedCount / rooms.length) * 100).toFixed(1);

      const statsDiv = document.getElementById('stats');
      statsDiv.innerHTML = `
        <div class="stat-card">
          <div class="stat-label">Total Rooms</div>
          <div class="stat-value">${rooms.length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Booked</div>
          <div class="stat-value">${bookedCount}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Available</div>
          <div class="stat-value">${availableCount}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Occupancy Rate</div>
          <div class="stat-value">${occupancyRate}%</div>
        </div>
      `;
    }

    function showMessage(text, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.textContent = text;
      messageDiv.className = `message ${type}`;
      messageDiv.style.display = 'block';

      if (type === 'success') {
        setTimeout(() => {
          messageDiv.style.display = 'none';
        }, 4000);
      }
    }

    // Initialize on page load
    loadVisualization();
    setInterval(loadVisualization, 5000); // Refresh every 5 seconds
  </script>
</body>
</html>
